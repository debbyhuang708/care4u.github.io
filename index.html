<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内在小孩 — 你不是一个人</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --warm-bg: #faf8f4;
  --warm-surface: #f4f0e8;
  --warm-border: rgba(160,130,90,0.15);
  --warm-border-mid: rgba(160,130,90,0.28);
  --ember: #c07a3a;
  --ember-light: #e8a96a;
  --text-primary: #2a2118;
  --text-secondary: #7a6a55;
  --text-tertiary: #b0a090;
  --tag-bg: rgba(192,122,58,0.08);
  --tag-text: #9a6030;
  --serif: 'Noto Serif SC', Georgia, serif;
  --sans: 'Noto Sans SC', system-ui, sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
  --tr: 0.2s ease;
}
html { scroll-behavior: smooth; }
body { font-family: var(--sans); background: var(--warm-bg); color: var(--text-primary); font-size: 15px; line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* NAV */
nav { position: sticky; top: 0; z-index: 100; background: rgba(250,248,244,0.92); border-bottom: 0.5px solid var(--warm-border); padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); }
.logo { font-family: var(--serif); font-size: 16px; font-weight: 400; color: var(--text-primary); display: flex; align-items: center; gap: 8px; text-decoration: none; }
.logo-flame { width: 18px; height: 22px; }
.nav-links { display: flex; align-items: center; gap: 4px; }
.nav-btn { background: none; border: none; font-family: var(--sans); font-size: 13px; color: var(--text-secondary); padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: color var(--tr), background var(--tr); }
.nav-btn:hover { color: var(--text-primary); background: var(--warm-surface); }
.nav-btn.active { color: var(--text-primary); }
.nav-cta { background: var(--text-primary); color: var(--warm-bg); border: none; font-family: var(--sans); font-size: 13px; padding: 7px 16px; border-radius: 20px; cursor: pointer; margin-left: 8px; transition: opacity var(--tr); }
.nav-cta:hover { opacity: 0.8; }

/* PAGES */
.page { display: none; }
.page.active { display: block; animation: fadeUp 0.5s ease both; }

/* HERO */
.hero { padding: 72px 28px 56px; max-width: 680px; }
.hero-eyebrow { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ember); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.hero-eyebrow::after { content:''; display:inline-block; width:24px; height:0.5px; background:var(--ember-light); }
.hero-title { font-family: var(--serif); font-size: 36px; font-weight: 300; line-height: 1.35; margin-bottom: 20px; letter-spacing: -0.01em; }
.hero-sub { font-size: 15px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 36px; max-width: 480px; }
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.btn-primary { background: var(--text-primary); color: var(--warm-bg); border: none; font-family: var(--sans); font-size: 14px; padding: 12px 24px; border-radius: 24px; cursor: pointer; transition: opacity var(--tr), transform var(--tr); }
.btn-primary:hover { opacity: 0.82; transform: translateY(-1px); }
.btn-outline { background: none; border: 0.5px solid var(--warm-border-mid); font-family: var(--sans); font-size: 14px; color: var(--text-secondary); padding: 12px 24px; border-radius: 24px; cursor: pointer; transition: border-color var(--tr), color var(--tr), transform var(--tr); }
.btn-outline:hover { border-color: var(--ember-light); color: var(--text-primary); transform: translateY(-1px); }

/* HEAL BANNER */
.heal-banner { margin: 0 28px 40px; background: var(--warm-surface); border: 0.5px solid var(--warm-border); border-radius: var(--radius); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.heal-left { display: flex; align-items: flex-start; gap: 14px; }
.heal-icon { width: 36px; height: 36px; background: rgba(192,122,58,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.heal-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.heal-text strong { color: var(--text-primary); font-weight: 500; display: block; margin-bottom: 2px; }
.heal-cta { background: none; border: 0.5px solid var(--warm-border-mid); border-radius: 20px; padding: 8px 18px; font-size: 13px; color: var(--text-secondary); cursor: pointer; white-space: nowrap; font-family: var(--sans); transition: all var(--tr); flex-shrink: 0; }
.heal-cta:hover { background: var(--warm-bg); border-color: var(--ember-light); color: var(--ember); }

/* DIVIDER */
.divider { height: 0.5px; background: var(--warm-border); margin: 0 28px; }

/* FEED */
.feed { padding: 28px; }
.feed-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 12px; flex-wrap: wrap; }
.feed-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); }
.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { background: none; border: 0.5px solid var(--warm-border); border-radius: 16px; padding: 5px 14px; font-size: 12px; font-family: var(--sans); color: var(--text-secondary); cursor: pointer; transition: all var(--tr); }
.filter-btn:hover { border-color: var(--warm-border-mid); color: var(--text-primary); }
.filter-btn.active { background: var(--text-primary); border-color: var(--text-primary); color: var(--warm-bg); }
.stories { display: flex; flex-direction: column; }
.story { padding: 22px 0; border-bottom: 0.5px solid var(--warm-border); }
.story:last-child { border-bottom: none; }
.story-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.story-tag { font-size: 11px; color: var(--tag-text); background: var(--tag-bg); padding: 3px 10px; border-radius: 10px; }
.story-dot { width: 2px; height: 2px; border-radius: 50%; background: var(--warm-border-mid); }
.story-loc { font-size: 11px; color: var(--text-tertiary); }
.story-body { font-family: var(--serif); font-size: 15px; font-weight: 300; line-height: 1.85; margin-bottom: 14px; }
.story-footer { display: flex; align-items: center; gap: 16px; }
.story-action { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-tertiary); background: none; border: none; font-family: var(--sans); cursor: pointer; padding: 0; transition: color var(--tr); }
.story-action svg { width: 14px; height: 14px; flex-shrink: 0; }
.story-action:hover, .story-action.liked { color: var(--ember); }
.story-resonance { font-size: 11px; color: var(--text-tertiary); margin-left: auto; }

/* COMPOSE BAR */
.compose-bar { position: sticky; bottom: 0; background: rgba(250,248,244,0.95); border-top: 0.5px solid var(--warm-border); padding: 14px 28px; display: flex; align-items: flex-end; gap: 10px; backdrop-filter: blur(8px); }
.compose-wrap { flex: 1; }
.compose-input { width: 100%; min-height: 44px; max-height: 160px; background: var(--warm-surface); border: 0.5px solid var(--warm-border); border-radius: var(--radius); padding: 12px 16px; font-size: 14px; font-family: var(--serif); font-weight: 300; color: var(--text-primary); resize: none; outline: none; line-height: 1.6; transition: border-color var(--tr); }
.compose-input::placeholder { color: var(--text-tertiary); }
.compose-input:focus { border-color: var(--warm-border-mid); }
.compose-hint { font-size: 11px; color: var(--text-tertiary); margin-top: 5px; padding-left: 2px; }
.compose-send { background: var(--text-primary); color: var(--warm-bg); border: none; border-radius: 22px; padding: 11px 20px; font-size: 13px; font-family: var(--sans); cursor: pointer; white-space: nowrap; transition: opacity var(--tr), transform var(--tr); flex-shrink: 0; margin-bottom: 22px; }
.compose-send:hover { opacity: 0.82; transform: translateY(-1px); }
.compose-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

/* ═══ HEAL PAGE ═══ */
.heal-page { padding: 48px 28px 120px; max-width: 760px; }
.heal-page-title { font-family: var(--serif); font-size: 28px; font-weight: 300; margin-bottom: 8px; }
.heal-page-sub { font-size: 14px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 40px; max-width: 520px; }
.method-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
.method-card {
  background: var(--warm-bg);
  border: 0.5px solid var(--warm-border);
  border-radius: var(--radius);
  padding: 22px 20px;
  cursor: pointer;
  transition: border-color var(--tr), transform var(--tr);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.method-card:hover { border-color: var(--ember-light); transform: translateY(-2px); }
.method-card-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.method-card-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.method-card-en { font-size: 11px; color: var(--text-tertiary); }
.method-card-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
.method-card-meta { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.method-pill { font-size: 11px; color: var(--tag-text); background: var(--tag-bg); padding: 2px 9px; border-radius: 8px; }

/* ═══ PRACTICE MODAL ═══ */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(42,33,24,0.5); z-index: 200; align-items: center; justify-content: center; padding: 16px; overflow-y: auto; }
.modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
.modal { background: var(--warm-bg); border-radius: var(--radius); padding: 0; max-width: 520px; width: 100%; border: 0.5px solid var(--warm-border); animation: slideUp 0.28s ease; overflow: hidden; max-height: 90vh; display: flex; flex-direction: column; }
.modal-header { padding: 28px 28px 0; flex-shrink: 0; }
.modal-body { padding: 0 28px 28px; overflow-y: auto; flex: 1; }
.modal-title { font-family: var(--serif); font-size: 20px; font-weight: 400; margin-bottom: 4px; }
.modal-title-en { font-size: 12px; color: var(--text-tertiary); margin-bottom: 16px; }
.modal-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.75; margin-bottom: 24px; }
.modal-footer { padding: 16px 28px; border-top: 0.5px solid var(--warm-border); display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0; background: var(--warm-bg); }
.modal-cancel { background: none; border: 0.5px solid var(--warm-border-mid); border-radius: 20px; padding: 9px 20px; font-size: 13px; font-family: var(--sans); color: var(--text-secondary); cursor: pointer; }
.modal-cancel:hover { color: var(--text-primary); }
.modal-submit { background: var(--text-primary); color: var(--warm-bg); border: none; border-radius: 20px; padding: 9px 20px; font-size: 13px; font-family: var(--sans); cursor: pointer; transition: opacity var(--tr); }
.modal-submit:hover { opacity: 0.8; }

/* PRACTICE STEPPER */
.practice-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.practice-progress { display: flex; gap: 4px; }
.progress-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--warm-border-mid); transition: background 0.3s; }
.progress-dot.done { background: var(--ember-light); }
.progress-dot.active { background: var(--ember); }
.practice-step-label { font-size: 11px; color: var(--text-tertiary); }

.step-content { animation: fadeUp 0.35s ease both; }
.step-num-badge { font-family: var(--serif); font-size: 32px; font-weight: 300; color: var(--ember-light); line-height: 1; margin-bottom: 12px; }
.step-instruction { font-family: var(--serif); font-size: 17px; font-weight: 300; line-height: 1.7; color: var(--text-primary); margin-bottom: 16px; }
.step-detail { font-size: 13px; color: var(--text-secondary); line-height: 1.75; margin-bottom: 20px; }

/* TIMER */
.timer-block { background: var(--warm-surface); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.timer-ring-wrap { position: relative; width: 80px; height: 80px; }
.timer-ring-wrap svg { transform: rotate(-90deg); }
.timer-ring-bg { fill: none; stroke: var(--warm-border-mid); stroke-width: 3; }
.timer-ring-fill { fill: none; stroke: var(--ember-light); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.timer-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 20px; color: var(--text-primary); }
.timer-label { font-size: 12px; color: var(--text-tertiary); text-align: center; }
.timer-controls { display: flex; gap: 8px; }
.timer-btn { background: none; border: 0.5px solid var(--warm-border-mid); border-radius: 16px; padding: 6px 16px; font-size: 12px; font-family: var(--sans); color: var(--text-secondary); cursor: pointer; transition: all var(--tr); }
.timer-btn:hover { border-color: var(--ember-light); color: var(--ember); }
.timer-btn.primary { background: var(--text-primary); color: var(--warm-bg); border-color: var(--text-primary); }
.timer-btn.primary:hover { opacity: 0.8; }

/* BREATH GUIDE */
.breath-block { background: var(--warm-surface); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
.breath-circle-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
.breath-circle { width: 72px; height: 72px; border-radius: 50%; background: rgba(192,122,58,0.12); border: 0.5px solid var(--ember-light); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--ember); transition: transform 0.8s ease, background 0.8s ease; }
.breath-circle.expand { transform: scale(1.35); background: rgba(192,122,58,0.22); }
.breath-circle.hold { transform: scale(1.35); background: rgba(192,122,58,0.18); }
.breath-circle.contract { transform: scale(1); background: rgba(192,122,58,0.08); }
.breath-phase { font-size: 13px; color: var(--text-secondary); text-align: center; }
.breath-pattern { font-size: 11px; color: var(--text-tertiary); text-align: center; }

/* STEP NAV */
.step-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.step-nav-btn { background: none; border: 0.5px solid var(--warm-border-mid); border-radius: 20px; padding: 9px 20px; font-size: 13px; font-family: var(--sans); color: var(--text-secondary); cursor: pointer; transition: all var(--tr); }
.step-nav-btn:hover { border-color: var(--ember-light); color: var(--text-primary); }
.step-nav-btn.next-btn { background: var(--text-primary); color: var(--warm-bg); border-color: var(--text-primary); }
.step-nav-btn.next-btn:hover { opacity: 0.82; }
.step-nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* COMPLETE STATE */
.complete-block { text-align: center; padding: 24px 0 8px; }
.complete-icon { width: 52px; height: 52px; border-radius: 50%; background: var(--tag-bg); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.complete-title { font-family: var(--serif); font-size: 20px; font-weight: 300; margin-bottom: 8px; }
.complete-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }

/* COMPOSE MODAL */
.compose-modal-wrap { padding: 28px; }
.modal-section { margin-bottom: 20px; }
.modal-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 8px; display: block; letter-spacing: 0.04em; }
.modal-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.modal-tag { background: none; border: 0.5px solid var(--warm-border-mid); border-radius: 14px; padding: 5px 14px; font-size: 12px; font-family: var(--sans); color: var(--text-secondary); cursor: pointer; transition: all var(--tr); }
.modal-tag:hover, .modal-tag.selected { background: var(--tag-bg); border-color: var(--ember-light); color: var(--ember); }
.modal-textarea { width: 100%; min-height: 120px; background: var(--warm-surface); border: 0.5px solid var(--warm-border); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 14px; font-family: var(--serif); font-weight: 300; color: var(--text-primary); resize: none; outline: none; line-height: 1.7; transition: border-color var(--tr); }
.modal-textarea::placeholder { color: var(--text-tertiary); }
.modal-textarea:focus { border-color: var(--warm-border-mid); }

/* TOAST */
.toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text-primary); color: var(--warm-bg); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.3s ease; pointer-events: none; white-space: nowrap; z-index: 400; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ANIMATIONS */
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes slideUp { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
@keyframes storyIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

@media (max-width: 600px) {
  .hero { padding: 48px 20px 40px; }
  .hero-title { font-size: 27px; }
  nav { padding: 0 16px; }
  .heal-banner { margin: 0 20px 32px; flex-direction: column; align-items: flex-start; }
  .divider { margin: 0 20px; }
  .feed { padding: 20px; }
  .compose-bar { padding: 12px 20px; }
  .heal-page { padding: 32px 20px 120px; }
  .method-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal { margin: 0 4px; }
}
</style>
</head>
<body>

<nav>
  <a href="#" class="logo" onclick="showPage('home'); return false;">
    <svg class="logo-flame" viewBox="0 0 18 22" fill="none">
      <path d="M9 2C9 2 5 6 5 10C5 10 3 9 3 7C3 7 1 10 1 13C1 17.4 4.6 21 9 21C13.4 21 17 17.4 17 13C17 8 12 4 9 2Z" fill="#c07a3a" opacity="0.85"/>
      <path d="M9 10C9 10 7 12 7 14C7 14 8 13.5 8.5 13C8.5 13 8 15 9 16C10 15 9.5 13 9.5 13C10 13.5 11 14 11 14C11 12 9 10 9 10Z" fill="#e8a96a" opacity="0.9"/>
    </svg>
    内在小孩
  </a>
  <div class="nav-links">
    <button class="nav-btn" id="navHome" onclick="showPage('home')">倾诉</button>
    <button class="nav-btn" id="navHeal" onclick="showPage('heal')">治愈</button>
    <button class="nav-cta" onclick="openComposeModal()">匿名倾诉</button>
  </div>
</nav>

<!-- HOME PAGE -->
<div class="page active" id="pageHome">
  <div class="hero">
    <div class="hero-eyebrow">完全匿名 &nbsp;·&nbsp; 来自世界各地</div>
    <h1 class="hero-title">你不是一个人。<br>这里收集<br>所有被藏起来的悲伤。</h1>
    <p class="hero-sub">每一段伤痛都值得被看见。在这里说出来，找到和你相似的人，慢慢愈合那个内在小孩。</p>
    <div class="hero-actions">
      <button class="btn-primary" onclick="openComposeModal()">匿名倾诉</button>
      <button class="btn-outline" onclick="showPage('heal')">探索治愈方法</button>
    </div>
  </div>

  <div class="heal-banner">
    <div class="heal-left">
      <div class="heal-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#c07a3a" stroke-width="1.5"><path d="M8 1l1.5 3 3.5.5-2.5 2.5.6 3.5L8 9l-3.1 1.5.6-3.5L3 4.5l3.5-.5z"/></svg>
      </div>
      <div class="heal-text">
        <strong>本周推荐：生理叹息法</strong>
        斯坦福神经科学家证实——45 秒内平复焦虑最有效的呼吸法。完全不需要任何基础。
      </div>
    </div>
    <button class="heal-cta" onclick="openPractice('sigh')">试一试 →</button>
  </div>

  <div class="divider"></div>

  <div class="feed" id="feed">
    <div class="feed-header">
      <div class="feed-label">最新的声音</div>
      <div class="filters">
        <button class="filter-btn active" data-tag="全部">全部</button>
        <button class="filter-btn" data-tag="原生家庭">原生家庭</button>
        <button class="filter-btn" data-tag="童年">童年</button>
        <button class="filter-btn" data-tag="关系">关系</button>
        <button class="filter-btn" data-tag="自我">自我</button>
      </div>
    </div>
    <div class="stories" id="storiesList"></div>
  </div>

  <div class="compose-bar">
    <div class="compose-wrap">
      <textarea class="compose-input" id="quickCompose" placeholder="今天有什么想说的？完全匿名，不需要登录。" rows="1"></textarea>
      <div class="compose-hint">按 Enter 发送 · 完全匿名 · 不留任何个人信息</div>
    </div>
    <button class="compose-send" id="composeSendBtn" disabled onclick="quickSend()">发出去</button>
  </div>
</div>

<!-- HEAL PAGE -->
<div class="page" id="pageHeal">
  <div class="heal-page">
    <h1 class="heal-page-title">找到适合你的方式</h1>
    <p class="heal-page-sub">每一种方法都有科学依据，也都很温和。你不需要全部尝试——找到一两种让你感觉对的，慢慢练习就好。</p>
    <div class="method-grid" id="methodGrid"></div>
  </div>
</div>

<!-- PRACTICE MODAL -->
<div class="modal-overlay" id="practiceModal">
  <div class="modal" id="practiceModalInner">
    <div class="modal-header">
      <h2 class="modal-title" id="pmTitle"></h2>
      <div class="modal-title-en" id="pmEn"></div>

// ─── PRACTICE STATE ──────────────────────────────────────
let currentMethod = null;
let currentStep = 0;
let timerInterval = null;
let timerRemaining = 0;
let breathInterval = null;
let breathPhaseIdx = 0;

// ─── RENDER METHODS ──────────────────────────────────────
function renderMethods() {
  const grid = document.getElementById('methodGrid');
  Object.entries(METHODS).forEach(([key, m]) => {
    const card = document.createElement('div');
    card.className = 'method-card';
    card.onclick = () => openPractice(key);
    card.innerHTML = `
      <div class="method-card-icon" style="background:${m.color}">${m.icon}</div>
      <div>
        <div class="method-card-name">${m.name}</div>
        <div class="method-card-en">${m.en}</div>
      </div>
      <div class="method-card-desc">${m.desc}</div>
      <div class="method-card-meta">
        <span class="method-pill">${m.time}</span>
        <span class="method-pill">${m.level}</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ─── OPEN PRACTICE ───────────────────────────────────────
function openPractice(key) {
  currentMethod = METHODS[key];
  currentStep = 0;
  document.getElementById('pmTitle').textContent = currentMethod.name;
  document.getElementById('pmEn').textContent = currentMethod.en;
  document.getElementById('pmSub').textContent = currentMethod.desc;
  renderDots();
  renderStep();
  document.getElementById('practiceModal').classList.add('open');
}

function closePractice() {
  clearTimer();
  clearBreath();
  document.getElementById('practiceModal').classList.remove('open');
}

function renderDots() {
  const dots = document.getElementById('pmDots');
  const total = currentMethod.steps.length;
  dots.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'progress-dot' + (i < currentStep ? ' done' : i === currentStep ? ' active' : '');
    dots.appendChild(d);
  }
  document.getElementById('pmStepLabel').textContent = `${currentStep + 1} / ${total}`;
}

function renderStep() {
  clearTimer();
  clearBreath();
  const step = currentMethod.steps[currentStep];
  const total = currentMethod.steps.length;
  const isLast = currentStep === total - 1;

  let html = `<div class="step-content">`;
  html += `<div class="step-num-badge">${['一','二','三','四','五','六','七'][currentStep]}</div>`;
  html += `<div class="step-instruction">${step.instruction}</div>`;
  html += `<div class="step-detail">${step.detail}</div>`;

  if (step.breath) {
    html += `<div class="breath-block" id="breathBlock">
      <div class="breath-circle-wrap">
        <div class="breath-circle" id="breathCircle">${step.breath.phase}</div>
      </div>
      <div class="breath-phase" id="breathPhaseText">${step.breath.label}</div>
      <div class="breath-pattern">${step.breath.pattern}</div>
    </div>`;
  }

  if (step.timerSec) {
    html += `<div class="timer-block">
      <div class="timer-ring-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="timer-ring-bg" cx="40" cy="40" r="34"/>
          <circle class="timer-ring-fill" id="timerRing" cx="40" cy="40" r="34"
            stroke-dasharray="${2 * Math.PI * 34}"
            stroke-dashoffset="0"/>
        </svg>
        <div class="timer-text" id="timerText">${formatTime(step.timerSec)}</div>
      </div>
      <div class="timer-label">${step.timerLabel}</div>
      <div class="timer-controls">
        <button class="timer-btn primary" id="timerStartBtn" onclick="startTimer(${step.timerSec})">开始计时</button>
        <button class="timer-btn" onclick="resetTimer(${step.timerSec})">重置</button>
      </div>
    </div>`;
  }

  html += `<div class="step-nav">
    <button class="step-nav-btn" onclick="prevStep()" ${currentStep === 0 ? 'disabled' : ''}>← 上一步</button>
    ${isLast
      ? `<button class="step-nav-btn next-btn" onclick="completeMethod()">完成练习 ✓</button>`
      : `<button class="step-nav-btn next-btn" onclick="nextStep()">下一步 →</button>`
    }
  </div>`;
  html += '</div>';

  document.getElementById('pmStepContent').innerHTML = html;

  if (step.breath) startBreath(step.breath);
}

function nextStep() {
  if (currentStep < currentMethod.steps.length - 1) {
    currentStep++;
    renderDots();
    renderStep();
    document.querySelector('#practiceModal .modal-body').scrollTop = 0;
  }
}
function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    renderDots();
    renderStep();
    document.querySelector('#practiceModal .modal-body').scrollTop = 0;
  }
}
function completeMethod() {
  clearTimer(); clearBreath();
  const html = `<div class="complete-block">
    <div class="complete-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c07a3a" stroke-width="1.5">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>
    <div class="complete-title">你做到了。</div>
    <div class="complete-sub">每一次练习，都是给内在小孩的一份礼物。不管你感受到了什么，这都很好。<br><br>如果你愿意，可以把这次练习后的感受写下来，匿名分享在这里。</div>
    <div style="display:flex;justify-content:center;gap:10px;margin-top:24px">
      <button class="step-nav-btn" onclick="closePractice()">结束</button>
      <button class="step-nav-btn next-btn" onclick="openComposeModal(); closePractice()">写下感受</button>
    </div>
  </div>`;
  document.getElementById('pmStepContent').innerHTML = html;
  document.getElementById('pmDots').querySelectorAll('.progress-dot').forEach(d => d.classList.add('done'));
}

// ─── TIMER ───────────────────────────────────────────────
function formatTime(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `${s}s`;
}
function startTimer(total) {
  const btn = document.getElementById('timerStartBtn');
  if (btn) { btn.textContent = '计时中…'; btn.disabled = true; }
  timerRemaining = total;
  const circ = 2 * Math.PI * 34;
  timerInterval = setInterval(() => {
    timerRemaining--;
    const el = document.getElementById('timerText');
    const ring = document.getElementById('timerRing');
    if (el) el.textContent = formatTime(timerRemaining);
    if (ring) ring.style.strokeDashoffset = circ * (1 - timerRemaining / total);
    if (timerRemaining <= 0) {
      clearTimer();
      if (el) el.textContent = '完成';
      showToast('这一步完成了 ✓');
    }
  }, 1000);
}
function resetTimer(total) {
  clearTimer();
  const el = document.getElementById('timerText');
  const ring = document.getElementById('timerRing');
  const btn = document.getElementById('timerStartBtn');
  if (el) el.textContent = formatTime(total);
  if (ring) ring.style.strokeDashoffset = 0;
  if (btn) { btn.textContent = '开始计时'; btn.disabled = false; }
}
function clearTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

// ─── BREATH GUIDE ────────────────────────────────────────
function startBreath(b) {
  const phases = [];
  if (b.inhale > 0) phases.push({ label:'吸气', duration: b.inhale * 1000, cls:'expand' });
  if (b.hold > 0) phases.push({ label:'屏息', duration: b.hold * 1000, cls:'hold' });
  if (b.exhale > 0) phases.push({ label:'呼气', duration: b.exhale * 1000, cls:'contract' });
  if (phases.length === 0) return;

  let pi = 0;
  function runPhase() {
    const circle = document.getElementById('breathCircle');
    const phaseText = document.getElementById('breathPhaseText');
    if (!circle) return;
    const p = phases[pi % phases.length];
    circle.className = 'breath-circle ' + p.cls;
    circle.textContent = p.label;
    if (phaseText) phaseText.textContent = p.label + '…';
    pi++;
    breathInterval = setTimeout(runPhase, p.duration);
  }
  runPhase();
}
function clearBreath() { if (breathInterval) { clearTimeout(breathInterval); breathInterval = null; } }

// ─── STORIES ─────────────────────────────────────────────
let stories = [...STORIES];
let currentFilter = '全部';
let selectedTag = '原生家庭';
let nextId = 100;

function renderStories() {
  const list = document.getElementById('storiesList');
  const filtered = currentFilter === '全部' ? stories : stories.filter(s => s.tag === currentFilter);
  list.innerHTML = '';
  filtered.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'story';
    el.style.animation = `storyIn 0.4s ${i * 0.05}s ease both`;
    el.innerHTML = `
      <div class="story-meta">
        <span class="story-tag">${s.tag}</span>
        <div class="story-dot"></div>
        <span class="story-loc">${s.time} · ${s.loc}</span>
      </div>
      <div class="story-body">${escHtml(s.body)}</div>
      <div class="story-footer">
        <button class="story-action ${s.liked?'liked':''}" onclick="toggleLike(${s.id})">
          <svg viewBox="0 0 16 16" fill="${s.liked?'currentColor':'none'}" stroke="currentColor" stroke-width="1.5">
            <path d="M8 13s-6-3.5-6-7.5a4 4 0 0 1 6-3.44A4 4 0 0 1 14 5.5c0 4-6 7.5-6 7.5z"/>
          </svg>
          我也是
        </button>
        <button class="story-action" onclick="openComposeModal()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 10c0 .55.45 1 1 1h2l2 3 2-3h4c.55 0 1-.45 1-1V4c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1z"/>
          </svg>
          回应
        </button>
        <span class="story-resonance">${s.likes.toLocaleString()} 人感同身受</span>
      </div>`;
    list.appendChild(el);
  });
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toggleLike(id) {
  const s = stories.find(x => x.id === id);
  if (!s) return;
  s.liked ? (s.likes--, s.liked=false) : (s.likes++, s.liked=true, showToast('已记录 ♡'));
  renderStories();
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.tag;
    renderStories();
  });
});

// ─── COMPOSE ─────────────────────────────────────────────
const quickInput = document.getElementById('quickCompose');
const sendBtn = document.getElementById('composeSendBtn');
quickInput.addEventListener('input', function() {
  sendBtn.disabled = !this.value.trim();
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});
quickInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (this.value.trim()) quickSend(); }
});
function quickSend() {
  const val = quickInput.value.trim();
  if (!val) return;
  addStory('其他', val, '你的城市');
  quickInput.value = ''; quickInput.style.height = 'auto'; sendBtn.disabled = true;
  showToast('已匿名发出，谢谢你的勇气');
  resetFilter();
}
function openComposeModal() { document.getElementById('composeModal').classList.add('open'); }
function closeComposeModal() { document.getElementById('composeModal').classList.remove('open'); }
document.getElementById('composeModal').addEventListener('click', function(e) { if (e.target===this) closeComposeModal(); });
document.querySelectorAll('#modalTags .modal-tag').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#modalTags .modal-tag').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected'); selectedTag = btn.dataset.tag;
  });
});
function submitStory() {
  const content = document.getElementById('modalContent').value.trim();
  if (!content) { showToast('先写点什么吧'); return; }
  addStory(selectedTag, content, '某处');
  document.getElementById('modalContent').value = '';
  closeComposeModal();
  showToast('已匿名发出，谢谢你的勇气');
  resetFilter();
}
function addStory(tag, body, loc) {
  stories.unshift({ id:nextId++, tag, loc, time:'刚刚', likes:0, body, liked:false });
  renderStories();
  setTimeout(() => document.getElementById('feed').scrollIntoView({behavior:'smooth',block:'start'}), 100);
}
function resetFilter() {
  currentFilter = '全部';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-tag="全部"]').classList.add('active');
}

// ─── PAGE NAV ─────────────────────────────────────────────
function showPage(name) {
  document.getElementById('pageHome').classList.toggle('active', name==='home');
  document.getElementById('pageHeal').classList.toggle('active', name==='heal');
  document.getElementById('navHome').classList.toggle('active', name==='home');
  document.getElementById('navHeal').classList.toggle('active', name==='heal');
  window.scrollTo(0, 0);
}
function scrollToFeed() { document.getElementById('feed').scrollIntoView({behavior:'smooth',block:'start'}); }

// ─── PRACTICE MODAL CLOSE ON BACKDROP ────────────────────
document.getElementById('practiceModal').addEventListener('click', function(e) { if (e.target===this) closePractice(); });

// ─── TOAST ───────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── INIT ────────────────────────────────────────────────
renderMethods();
renderStories();
</script>
